
name: MLOps Pipeline — Tourism Package Predictor

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'   # Weekly retraining every Monday 2 AM UTC
  workflow_dispatch:      # Allow manual trigger from GitHub UI

env:
  PYTHON_VERSION: '3.10'
  HF_USERNAME: Bharath1434
  DATASET_REPO: Bharath1434/tourism-package-prediction-dataset
  MODEL_REPO: Bharath1434/tourism-package-prediction-model
  SPACE_REPO: Bharath1434/tourism-package-predictor

jobs:

  # ── JOB 1: Data Preparation ──────────────────────────────────
  data-preparation:
    name: 📊 Data Preparation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas scikit-learn imbalanced-learn huggingface_hub datasets

      - name: Run data preparation script
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python visit_with_us_mlops/scripts/data_prep.py

      - name: Upload processed data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: visit_with_us_mlops/data/processed/

  # ── JOB 2: Model Training ────────────────────────────────────
  model-training:
    name: 🧠 Model Training + MLflow
    runs-on: ubuntu-latest
    needs: data-preparation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: python-version: ${{ env.PYTHON_VERSION }}

      - name: Download processed data
        uses: actions/download-artifact@v4
        with: name: processed-data

      - name: Install ML dependencies
        run: |
          pip install xgboost scikit-learn mlflow optuna joblib
          pip install huggingface_hub datasets imbalanced-learn

      - name: Train model with Optuna tuning
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MLFLOW_TRACKING_URI: ./mlruns
        run: python visit_with_us_mlops/scripts/train.py

      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: best_xgb_model.pkl # This file is created in the root directory where the action runs

  # ── JOB 3: Model Evaluation ──────────────────────────────────
  model-evaluation:
    name: 📊 Evaluate & Quality Gate
    runs-on: ubuntu-latest
    needs: model-training
    outputs:
      auc_passed: ${{ steps.eval.outputs.auc_passed }}
    steps:
      - uses: actions/checkout@v4
      - name: Download model
        uses: actions/download-artifact@v4
        with: name: trained-model
      - name: Run evaluation + quality gate (AUC > 0.85)
        id: eval
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install xgboost scikit-learn pandas joblib huggingface_hub datasets
          python visit_with_us_mlops/scripts/evaluate.py
          echo "auc_passed=true" >> $GITHUB_OUTPUT

  # ── JOB 4: Deployment (only if quality gate passes) ──────────
  model-deployment:
    name: 🚀 Deploy to HF Spaces
    runs-on: ubuntu-latest
    needs: model-evaluation
    if: needs.model-evaluation.outputs.auc_passed == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python visit_with_us_mlops/scripts/deploy.py

      - name: Auto-push updated code to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 Auto: Model retrained & deployed [$(date +'%Y-%m-%d')]"
          git push origin main
